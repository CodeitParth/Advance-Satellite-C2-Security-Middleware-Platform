# SCSP — full stack via Docker Compose. Phase 3 containerization (TRD §18.3).
#
#   docker compose up --build           # db + redis + obc + backend + frontend
#   docker compose run --rm seed        # apply migration + seed demo data
#
# GEMINI_API_KEY is read from the host environment (or a repo-root .env file).

services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql://scsp:scsp@db:5432/scsp_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-only-secret-change-me-0123456789abcdef}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DEMO_MODE: ${DEMO_MODE:-true}
      OBC_HOST: obc
      OBC_PORT: 9000
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      obc:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL: ws://localhost:8000
        NEXT_PUBLIC_DEMO_MODE: ${DEMO_MODE:-true}
    ports: ["3000:3000"]
    depends_on: [backend]

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: scsp
      POSTGRES_PASSWORD: scsp
      POSTGRES_DB: scsp_db
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scsp -d scsp_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  obc:
    build: ./obc
    ports: ["9000:9000/udp"]

  # One-shot: migration + full demo seed (operators, telemetry, history,
  # scenarios, drift baselines). Run with: docker compose run --rm seed
  seed:
    build: ./backend
    profiles: ["tools"]
    environment:
      DATABASE_URL: postgresql://scsp:scsp@db:5432/scsp_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-only-secret-change-me-0123456789abcdef}
      DEMO_MODE: "true"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python scripts/run_migration.py && python scripts/seed_demo.py"

volumes:
  pgdata:
